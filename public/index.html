<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | Modern Wait</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --text: #e8e8f0;
            --muted: #8b8b9e;
            --accent: #6c5ce7;
            --accent2: #00cec9;
            --accent3: #fd79a8;
            --glass: rgba(255, 255, 255, 0.04);
            --glow-purple: rgba(108, 92, 231, 0.35);
            --glow-teal: rgba(0, 206, 201, 0.3);
            --glow-pink: rgba(253, 121, 168, 0.25);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ───── animated mesh background ───── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-mesh .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.55;
            animation: orbDrift 18s infinite ease-in-out alternate;
        }
        .bg-mesh .orb:nth-child(1) {
            width: 55vmax;
            height: 55vmax;
            background: var(--accent);
            top: -25%;
            left: -15%;
            animation-delay: 0s;
            animation-duration: 22s;
        }
        .bg-mesh .orb:nth-child(2) {
            width: 45vmax;
            height: 45vmax;
            background: var(--accent2);
            bottom: -20%;
            right: -10%;
            animation-delay: -6s;
            animation-duration: 20s;
        }
        .bg-mesh .orb:nth-child(3) {
            width: 35vmax;
            height: 35vmax;
            background: var(--accent3);
            top: 40%;
            left: 50%;
            animation-delay: -12s;
            animation-duration: 24s;
        }
        @keyframes orbDrift {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(4vw, -3vh) scale(1.15);
            }
            66% {
                transform: translate(-2vw, 5vh) scale(0.9);
            }
            100% {
                transform: translate(3vw, 2vh) scale(1.05);
            }
        }

        /* ───── grid overlay ───── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
        }

        /* ───── main card ───── */
        .dashboard {
            position: relative;
            z-index: 2;
            width: min(92vw, 580px);
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: clamp(28px, 5vw, 48px) clamp(20px, 4vw, 40px);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 1px 0 rgba(255, 255, 255, 0.03) inset;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: cardEnter 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }
        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ───── top accent line ───── */
        .accent-strip {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 3px;
            border-radius: 0 0 6px 6px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            animation: stripShimmer 3s infinite ease-in-out;
        }
        @keyframes stripShimmer {
            0%,
            100% {
                background-position: 0% 50%;
                opacity: 0.8;
            }
            50% {
                background-position: 100% 50%;
                opacity: 1;
            }
        }

        /* ───── icon / spinner zone ───── */
        .icon-zone {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 10px 0 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .spinner-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
            animation: spinRotate 3s linear infinite;
        }
        .spinner-ring:nth-child(1) {
            border-top-color: var(--accent);
            border-right-color: rgba(108, 92, 231, 0.5);
            animation-duration: 2.2s;
        }
        .spinner-ring:nth-child(2) {
            inset: 10px;
            border-bottom-color: var(--accent2);
            border-left-color: rgba(0, 206, 201, 0.5);
            animation-duration: 2.8s;
            animation-direction: reverse;
        }
        .spinner-ring:nth-child(3) {
            inset: 22px;
            border-top-color: var(--accent3);
            border-right-color: rgba(253, 121, 168, 0.5);
            animation-duration: 3.4s;
        }
        @keyframes spinRotate {
            to {
                transform: rotate(360deg);
            }
        }
        .icon-inner {
            position: relative;
            z-index: 2;
            font-size: 2.2rem;
            animation: iconPulse 2s infinite ease-in-out;
        }
        @keyframes iconPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.18);
                opacity: 1;
            }
        }

        /* ───── heading ───── */
        h1 {
            font-size: clamp(1.6rem, 4.5vw, 2.2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #c4c4d8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: textShine 4s infinite ease-in-out;
        }
        @keyframes textShine {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.35);
            }
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }
        .code-badge {
            display: inline-block;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 16px;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.8rem;
            color: var(--accent2);
            letter-spacing: 0.04em;
            animation: badgeFloat 3s infinite ease-in-out;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        @keyframes badgeFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        /* ───── progress bar ───── */
        .progress-wrap {
            width: 100%;
            margin: 22px 0 10px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            background-size: 200% 100%;
            animation: progressFlow 2.5s infinite ease-in-out;
            width: 68%;
            transition: width 0.5s ease;
        }
        @keyframes progressFlow {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* ───── stats row ───── */
        .stats-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            margin-top: 18px;
        }
        .stat-pill {
            flex: 1 1 90px;
            min-width: 80px;
            max-width: 140px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition);
            cursor: default;
        }
        .stat-pill:hover {
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            transform: translateY(-3px);
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .stat-value.purple {
            color: #b8abff;
        }
        .stat-value.teal {
            color: #55efc4;
        }
        .stat-value.pink {
            color: #ffb8d2;
        }
        .stat-label {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 4px;
        }

        /* ───── dots pulse ───── */
        .dots-pulse {
            display: flex;
            gap: 7px;
            margin-top: 18px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: dotBounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) {
            animation-delay: 0s;
            background: var(--accent);
        }
        .dot:nth-child(2) {
            animation-delay: 0.2s;
            background: var(--accent2);
        }
        .dot:nth-child(3) {
            animation-delay: 0.4s;
            background: var(--accent3);
        }
        @keyframes dotBounce {
            0%,
            80%,
            100% {
                transform: scale(0.7);
                opacity: 0.4;
            }
            40% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        /* ───── responsive ───── */
        @media (max-width: 480px) {
            .dashboard {
                padding: 24px 16px 28px;
                border-radius: 16px;
            }
            .icon-zone {
                width: 72px;
                height: 72px;
                margin: 6px 0 12px;
            }
            .spinner-ring {
                border-width: 2px;
            }
            .icon-inner {
                font-size: 1.6rem;
            }
            .stats-row {
                gap: 8px;
            }
            .stat-pill {
                padding: 10px 6px;
                border-radius: 10px;
            }
            .stat-value {
                font-size: 1.05rem;
            }
            .stat-label {
                font-size: 0.62rem;
            }
        }
    </style>
</head>
<body>
    <!-- animated background orbs -->
    <div class="bg-mesh" aria-hidden="true">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="grid-overlay" aria-hidden="true"></div>

    <!-- dashboard card -->
    <main class="dashboard">
        <div class="accent-strip" aria-hidden="true"></div>

        <!-- spinner icon -->
        <div class="icon-zone" aria-label="Loading indicator">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <span class="icon-inner">⚡</span>
        </div>

        <h1>Dashboard</h1>
        <p class="subtitle">Your data is flowing smoothly</p>
        <span class="code-badge"><code>/* live */</code></span>

        <!-- progress -->
        <div class="progress-wrap">
            <div class="progress-label">
                <span>Data sync</span>
                <span id="progressPercent">68%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 68%;"></div>
            </div>
        </div>

        <!-- stats -->
        <div class="stats-row">
            <div class="stat-pill">
                <div class="stat-value purple">2.4k</div>
                <div class="stat-label">Requests</div>
            </div>
            <div class="stat-pill">
                <div class="stat-value teal">98.6%</div>
                <div class="stat-label">Uptime</div>
            </div>
            <div class="stat-pill">
                <div class="stat-value pink">~12ms</div>
                <div class="stat-label">Latency</div>
            </div>
        </div>

        <!-- bouncing dots -->
        <div class="dots-pulse" aria-hidden="true">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </main>

    <!-- subtle dynamic progress simulation -->
    <script>
        (function() {
            const fillEl = document.getElementById('progressFill');
            const percentEl = document.getElementById('progressPercent');
            if (!fillEl || !percentEl) return;

            let current = 68;
            let direction = 1;

            function tick() {
                // gentle oscillation between 55 and 92
                const delta = (Math.random() * 1.8 + 0.3) * direction;
                current += delta;
                if (current >= 92) {
                    current = 92;
                    direction = -1;
                } else if (current <= 55) {
                    current = 55;
                    direction = 1;
                }
                const rounded = Math.round(current);
                fillEl.style.width = rounded + '%';
                percentEl.textContent = rounded + '%';
            }

            // update every 1.2–2.2 seconds for a natural feel
            function scheduleNext() {
                tick();
                const delay = 1200 + Math.random() * 1000;
                setTimeout(scheduleNext, delay);
            }
            scheduleNext();
        })();
    </script>
</body>
</html>
